kind = "web"
previewPath = "/"
title = "Shameen Lock Master"
version = "1.0.0"
id = "artifacts/shameen-lock-master"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21812

[services.development]
run = "pnpm --filter @workspace/shameen-lock-master run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/shameen-lock-master", "run", "build" ]
publicDir = "artifacts/shameen-lock-master/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21812"
BASE_PATH = "/"
